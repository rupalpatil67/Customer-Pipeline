version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: customer_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d customer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-server:
    build: ./mock-server
    container_name: customer_mock_server
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')\" || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 30s

  pipeline-service:
    build: ./pipeline-service
    container_name: customer_pipeline
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/customer_db
      FLASK_BASE_URL: http://mock-server:5000
    restart: on-failure

volumes:
  postgres_data: